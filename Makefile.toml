# ESP-Radio project cargo-make configuration
# Usage: cargo make <task>
# Install: cargo install cargo-make

[env]
# Target chip
CHIP = "esp32c6"
# Build target
TARGET = "riscv32imac-unknown-none-elf"
# Default example name
EXAMPLE = "wifi_provision"
# defmt log level
DEFMT_LOG = "info"

# ============================================================
# Build tasks
# ============================================================

[tasks.build]
description = "Build main program (dev profile)"
command = "cargo"
args = ["build"]

[tasks.build-release]
description = "Build main program (release profile)"
command = "cargo"
args = ["build", "--release"]

[tasks.build-example]
description = "Build specified example (via EXAMPLE env var)"
command = "cargo"
args = ["build", "--example", "${EXAMPLE}"]

[tasks.build-example-release]
description = "Build specified example (release profile)"
command = "cargo"
args = ["build", "--example", "${EXAMPLE}", "--release"]

[tasks.build-all]
description = "Build library and all examples"
command = "cargo"
args = ["build", "--lib", "--examples"]

[tasks.build-all-release]
description = "Build library and all examples (release profile)"
command = "cargo"
args = ["build", "--lib", "--examples", "--release"]

# ============================================================
# Flash and run tasks
# ============================================================

[tasks.flash]
description = "Build and flash main program to device"
command = "cargo"
args = ["run"]

[tasks.flash-release]
description = "Build and flash main program to device (release profile)"
command = "cargo"
args = ["run", "--release"]

# cargo make flash-example -e EXAMPLE=rotary_encoder
[tasks.flash-example]
description = "Build and flash specified example to device"
command = "cargo"
args = ["run", "--example", "${EXAMPLE}"]

[tasks.flash-example-release]
description = "Build and flash specified example to device (release profile)"
command = "cargo"
args = ["run", "--example", "${EXAMPLE}", "--release"]

# ============================================================
# Code quality checks
# ============================================================

[tasks.check]
description = "Quick type check"
command = "cargo"
args = ["check", "--lib", "--examples"]

[tasks.clippy]
description = "Run clippy code linting"
command = "cargo"
args = ["clippy", "--lib", "--examples"]

[tasks.fmt]
description = "Format code"
command = "cargo"
args = ["fmt"]

[tasks.fmt-check]
description = "Check code formatting (no modifications)"
command = "cargo"
args = ["fmt", "--check"]

# ============================================================
# Clean tasks
# ============================================================

[tasks.clean]
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

# ============================================================
# Firmware size analysis
# ============================================================

[tasks.size]
description = "Show main program firmware size"
dependencies = ["build-release"]
command = "rust-size"
args = ["target/${TARGET}/release/radio"]

[tasks.size-example]
description = "Show specified example firmware size"
dependencies = ["build-example-release"]
command = "rust-size"
args = ["target/${TARGET}/release/examples/${EXAMPLE}"]

# ============================================================
# Test tasks
# ============================================================

[tasks.test]
description = "Run on-device tests"
command = "cargo"
args = ["test"]

# ============================================================
# Monitor tasks
# ============================================================

[tasks.monitor]
description = "Monitor device RTT output using probe-rs"
command = "probe-rs"
args = ["attach", "--chip", "${CHIP}", "target/${TARGET}/debug/radio", "--always-print-stacktrace"]

# ============================================================
# Combined workflows
# ============================================================

[tasks.ci]
description = "CI pipeline: format check + clippy + build"
dependencies = ["fmt-check", "clippy", "build-all-release"]

[tasks.dev]
description = "Development workflow: check + clippy"
dependencies = ["check", "clippy"]

[tasks.release]
description = "Release workflow: format check + clippy + release build"
dependencies = ["fmt-check", "clippy", "build-all-release"]

# ============================================================
# UI preview tasks (host-side, no ESP32 hardware needed)
# ============================================================
# Slint UI files can be previewed on the host machine using `slint-viewer`.
# This is independent of the embedded firmware build and useful for fast
# iteration on layout, colors, fonts, RDS marquee, etc.
#
# macOS note:
#   On macOS 26 (Tahoe) / Xcode 26+, the system SDK headers require clang to
#   receive an explicit `-target` triple. Some transitive build dependencies
#   of slint-viewer (e.g. `bonjour-sys`) drive `bindgen` directly and would
#   otherwise fail with `architecture not supported` from <machine/_types.h>.
#   We therefore export `SDKROOT` and `BINDGEN_EXTRA_CLANG_ARGS` for every
#   UI task below so users do not need to set them manually.

[tasks.ui-install-viewer]
description = "Install slint-viewer (host UI preview tool)"
install_crate = {crate_name = "slint-viewer", binary = "slint-viewer", test_arg = "--version"}
command = "slint-viewer"
args = ["--version"]

[tasks.ui-install-viewer.env]
SDKROOT = {script = ["xcrun --show-sdk-path 2>/dev/null || echo"]}
BINDGEN_EXTRA_CLANG_ARGS = {script = [
  "sdk=$(xcrun --show-sdk-path 2>/dev/null); if [ -n \"$sdk\" ]; then echo \"-isysroot $sdk -target $(uname -m)-apple-darwin\"; else echo; fi",
]}
MACOSX_DEPLOYMENT_TARGET = "14.0"

[tasks.ui-preview]
description = "Live-preview the radio UI on the host (auto-reload on save)"
install_crate = {crate_name = "slint-viewer", binary = "slint-viewer", test_arg = "--version"}
command = "slint-viewer"
args = ["-I", "material-1.0", "--auto-reload", "ui/radio_ui.slint"]

[tasks.ui-preview.env]
SDKROOT = {script = ["xcrun --show-sdk-path 2>/dev/null || echo"]}
BINDGEN_EXTRA_CLANG_ARGS = {script = [
  "sdk=$(xcrun --show-sdk-path 2>/dev/null); if [ -n \"$sdk\" ]; then echo \"-isysroot $sdk -target $(uname -m)-apple-darwin\"; else echo; fi",
]}
MACOSX_DEPLOYMENT_TARGET = "14.0"

[tasks.ui-preview-data]
description = "Live-preview the radio UI with sample data (RDS / volume / signal)"
install_crate = {crate_name = "slint-viewer", binary = "slint-viewer", test_arg = "--version"}
command = "slint-viewer"
args = [
  "-I", "material-1.0",
  "--auto-reload",
  "--load-data", "ui/preview_data.json",
  "ui/radio_ui.slint",
]

[tasks.ui-preview-data.env]
SDKROOT = {script = ["xcrun --show-sdk-path 2>/dev/null || echo"]}
BINDGEN_EXTRA_CLANG_ARGS = {script = [
  "sdk=$(xcrun --show-sdk-path 2>/dev/null); if [ -n \"$sdk\" ]; then echo \"-isysroot $sdk -target $(uname -m)-apple-darwin\"; else echo; fi",
]}
MACOSX_DEPLOYMENT_TARGET = "14.0"
