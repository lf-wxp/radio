# ESP-Radio project cargo-make configuration
# Usage: cargo make <task>
# Install: cargo install cargo-make

[env]
# Target chip
CHIP = "esp32c6"
# Build target
TARGET = "riscv32imac-unknown-none-elf"
# Default example name
EXAMPLE = "wifi_provision"
# defmt log level
DEFMT_LOG = "info"

# ============================================================
# Build tasks
# ============================================================

[tasks.build]
description = "Build main program (dev profile)"
command = "cargo"
args = ["build"]

[tasks.build-release]
description = "Build main program (release profile)"
command = "cargo"
args = ["build", "--release"]

[tasks.build-example]
description = "Build specified example (via EXAMPLE env var)"
command = "cargo"
args = ["build", "--example", "${EXAMPLE}"]

[tasks.build-example-release]
description = "Build specified example (release profile)"
command = "cargo"
args = ["build", "--example", "${EXAMPLE}", "--release"]

[tasks.build-all]
description = "Build library and all examples"
command = "cargo"
args = ["build", "--lib", "--examples"]

[tasks.build-all-release]
description = "Build library, all examples, and the radio binary (release profile)"
command = "cargo"
args = ["build", "--lib", "--examples", "--bin", "radio", "--release"]

# ============================================================
# Flash and run tasks
# ============================================================

[tasks.flash]
description = "Build and flash main program to device"
command = "cargo"
args = ["run"]

[tasks.flash-release]
description = "Build and flash main program to device (release profile)"
command = "cargo"
args = ["run", "--release"]

# cargo make flash-example -e EXAMPLE=rotary_encoder
[tasks.flash-example]
description = "Build and flash specified example to device"
command = "cargo"
args = ["run", "--example", "${EXAMPLE}"]

[tasks.flash-example-release]
description = "Build and flash specified example to device (release profile)"
command = "cargo"
args = ["run", "--example", "${EXAMPLE}", "--release"]

# ============================================================
# Code quality checks
# ============================================================

[tasks.check]
description = "Quick type check"
command = "cargo"
args = ["check", "--lib", "--examples"]

[tasks.clippy]
description = "Run clippy code linting"
command = "cargo"
args = ["clippy", "--lib", "--examples"]

[tasks.fmt]
description = "Format code"
command = "cargo"
args = ["fmt"]

[tasks.fmt-check]
description = "Check code formatting (no modifications)"
command = "cargo"
args = ["fmt", "--check"]

# ============================================================
# Clean tasks
# ============================================================

[tasks.clean]
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

# ============================================================
# Firmware size analysis
# ============================================================

[tasks.size]
description = "Show main program firmware size"
dependencies = ["build-release"]
command = "rust-size"
args = ["target/${TARGET}/release/radio"]

[tasks.size-example]
description = "Show specified example firmware size"
dependencies = ["build-example-release"]
command = "rust-size"
args = ["target/${TARGET}/release/examples/${EXAMPLE}"]

# ============================================================
# Test tasks
# ============================================================

[tasks.test]
description = "Run on-device tests (probe-rs)"
command = "cargo"
args = ["test"]

[tasks.host-test]
description = "Run host-side unit tests for pure-logic mirrors (tools/host-tests)"
# We set the env variables inside a sub-shell rather than via [tasks.host-test.env]
# because cargo-make leaks env across subsequent tasks in a `dependencies` chain
# (the next task `build-all-release` would inherit CARGO_BUILD_TARGET and fail
# with `esp-hal` build.rs panic). A scoped env in a sub-shell isolates them.
script_runner = "@shell"
script = '''
RUSTUP_TOOLCHAIN=stable \
CARGO_BUILD_TARGET="$(rustc -vV | sed -n 's/host: //p')" \
RUSTFLAGS= \
cargo test --manifest-path tools/host-tests/Cargo.toml
'''

# ============================================================
# Monitor tasks
# ============================================================

[tasks.monitor]
description = "Monitor device RTT output using probe-rs"
command = "probe-rs"
args = ["attach", "--chip", "${CHIP}", "target/${TARGET}/debug/radio", "--always-print-stacktrace"]

# ============================================================
# Combined workflows
# ============================================================

[tasks.ci]
description = "CI pipeline: format check + clippy + host tests + release build"
dependencies = ["fmt-check", "clippy", "host-test", "build-all-release"]

[tasks.dev]
description = "Development workflow: check + clippy"
dependencies = ["check", "clippy"]

[tasks.release]
description = "Release workflow: format check + clippy + release build"
dependencies = ["fmt-check", "clippy", "build-all-release"]

# ============================================================
# UI preview tasks (host-side, no ESP32 hardware needed)
# ============================================================
# Slint UI files can be previewed on the host machine using `slint-viewer`.
# This is independent of the embedded firmware build and useful for fast
# iteration on layout, colors, fonts, RDS marquee, etc.
#
# macOS note:
#   On macOS 26 (Tahoe) / Xcode 26+, the system SDK headers require clang to
#   receive an explicit `-target` triple. Some transitive build dependencies
#   of slint-viewer (e.g. `bonjour-sys`) drive `bindgen` directly and would
#   otherwise fail with `architecture not supported` from <machine/_types.h>.
#   We therefore export `SDKROOT` and `BINDGEN_EXTRA_CLANG_ARGS` for every
#   UI task below so users do not need to set them manually.

[tasks.ui-install-viewer]
description = "Install slint-viewer (host UI preview tool)"
install_crate = {crate_name = "slint-viewer", binary = "slint-viewer", test_arg = "--version"}
command = "slint-viewer"
args = ["--version"]

[tasks.ui-install-viewer.env]
SDKROOT = {script = ["xcrun --show-sdk-path 2>/dev/null || echo"]}
BINDGEN_EXTRA_CLANG_ARGS = {script = [
  "sdk=$(xcrun --show-sdk-path 2>/dev/null); if [ -n \"$sdk\" ]; then echo \"-isysroot $sdk -target $(uname -m)-apple-darwin\"; else echo; fi",
]}
MACOSX_DEPLOYMENT_TARGET = "14.0"

[tasks.ui-preview]
description = "Live-preview the radio UI on the host (auto-reload on save)"
install_crate = {crate_name = "slint-viewer", binary = "slint-viewer", test_arg = "--version"}
command = "slint-viewer"
args = ["-I", "material-1.0", "--auto-reload", "ui/radio_ui.slint"]

[tasks.ui-preview.env]
SDKROOT = {script = ["xcrun --show-sdk-path 2>/dev/null || echo"]}
BINDGEN_EXTRA_CLANG_ARGS = {script = [
  "sdk=$(xcrun --show-sdk-path 2>/dev/null); if [ -n \"$sdk\" ]; then echo \"-isysroot $sdk -target $(uname -m)-apple-darwin\"; else echo; fi",
]}
MACOSX_DEPLOYMENT_TARGET = "14.0"

[tasks.ui-preview-data]
description = "Live-preview the radio UI with sample data (RDS / volume / signal)"
install_crate = {crate_name = "slint-viewer", binary = "slint-viewer", test_arg = "--version"}
command = "slint-viewer"
args = [
  "-I", "material-1.0",
  "--auto-reload",
  "--load-data", "ui/preview_data.json",
  "ui/radio_ui.slint",
]

[tasks.ui-preview-data.env]
SDKROOT = {script = ["xcrun --show-sdk-path 2>/dev/null || echo"]}
BINDGEN_EXTRA_CLANG_ARGS = {script = [
  "sdk=$(xcrun --show-sdk-path 2>/dev/null); if [ -n \"$sdk\" ]; then echo \"-isysroot $sdk -target $(uname -m)-apple-darwin\"; else echo; fi",
]}
MACOSX_DEPLOYMENT_TARGET = "14.0"

# ============================================================
# OTA developer workflow (host-side, no ESP32 hardware needed for ota-serve)
# ============================================================
# Pipeline:
#   1) `cargo make ota-image`  → builds release ELF and converts it to a flat
#      `.bin` understood by the ESP32-C6 ROM bootloader, written next to the
#      ELF as `radio.bin`.
#   2) `cargo make ota-serve`  → starts the in-tree Rust dev server (lives
#      under `tools/ota-serve/`) and prints `http://<lan-ip>:8000/firmware.bin`
#      plus a terminal QR code. Paste the URL into the device's web console
#      OTA card.
#
# The dev-server tool is a stand-alone host crate that sits OUTSIDE the
# parent project's RISC-V build environment. Cargo would otherwise inherit
# `.cargo/config.toml` (target = riscv32imac-…, `-Z stack-protector=all`,
# `build-std`), which the host stable toolchain rejects. We override those
# with environment variables defined under `[tasks.ota-serve.env]` below.

[tasks.ota-image]
description = "Convert the release ELF into a flashable .bin image (espflash save-image)"
dependencies = ["build-release"]
install_crate = {crate_name = "espflash", binary = "espflash", test_arg = "--version"}
command = "espflash"
args = [
  "save-image",
  "--chip", "${CHIP}",
  "target/${TARGET}/release/radio",
  "target/${TARGET}/release/radio.bin",
]

[tasks.ota-serve]
description = "Serve the OTA image to the LAN with a Rust dev server (prints URL + QR code)"
dependencies = ["ota-image"]
command = "cargo"
args = [
  "run",
  "--manifest-path", "tools/ota-serve/Cargo.toml",
  "--release",
  "--",
  "--image", "target/${TARGET}/release/radio.bin",
  "--port", "8000",
]

[tasks.ota-serve.env]
# Force the host stable toolchain & host triple. Without these, cargo would
# propagate the embedded RISC-V `target` and `-Z stack-protector` rustflags
# from the parent project's `.cargo/config.toml`.
RUSTUP_TOOLCHAIN = "stable"
CARGO_BUILD_TARGET = {script = ["rustc -vV | sed -n 's/host: //p'"]}
RUSTFLAGS = ""
