<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>ESP-Radio</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f172a;
        --card: #1e293b;
        --card2: #0b1220;
        --fg: #e2e8f0;
        --muted: #94a3b8;
        --accent: #60a5fa;
        --accent-strong: #3b82f6;
        --warn: #f59e0b;
        --err: #ef4444;
        --border: #334155;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font: 16px/1.4 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        padding: 16px;
        max-width: 480px;
        margin: 0 auto;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 0 0 12px;
      }
      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
      }
      .freq {
        font-size: 56px;
        font-weight: 700;
        color: var(--accent);
        text-align: center;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      .freq small {
        font-size: 18px;
        color: var(--muted);
        font-weight: 500;
        margin-left: 6px;
      }
      .station {
        text-align: center;
        margin-top: 8px;
      }
      .station .name {
        font-size: 18px;
        font-weight: 600;
      }
      .station .rt {
        font-size: 13px;
        color: var(--muted);
        margin-top: 4px;
        min-height: 1em;
        word-break: break-word;
      }
      /* RT+ "now playing" chip: a one-line accent badge that surfaces
         the broadcaster-supplied title/artist tags above the raw RT.
         Hidden by default — the JS unhides it only when at least one
         tag is present, so stations that don't transmit RT+ keep the
         original layout intact. */
      .station .now-playing {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 6px;
        padding: 3px 10px;
        font-size: 13px;
        font-weight: 500;
        color: var(--accent-fg, #fff);
        background: var(--accent, #2563eb);
        border-radius: 999px;
        max-width: 100%;
        word-break: break-word;
        line-height: 1.3;
      }
      .station .now-playing .np-sep {
        opacity: 0.65;
      }
      .badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 8px;
        font-size: 12px;
      }
      .badge {
        padding: 2px 8px;
        border-radius: 999px;
        background: var(--card2);
        color: var(--muted);
      }
      .badge.on {
        background: var(--accent-strong);
        color: white;
      }
      .meter {
        height: 6px;
        background: var(--card2);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 12px;
      }
      .meter > span {
        display: block;
        height: 100%;
        background: var(--accent);
        width: 0%;
        transition: width 0.2s;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .grid.three {
        grid-template-columns: 1fr 1fr 1fr;
      }
      button {
        appearance: none;
        border: 0;
        font: inherit;
        background: var(--card2);
        color: var(--fg);
        border-radius: 10px;
        padding: 12px 8px;
        min-height: 44px;
        cursor: pointer;
        font-weight: 600;
      }
      button:active {
        background: var(--accent-strong);
      }
      button.primary {
        background: var(--accent-strong);
      }
      button.danger {
        background: var(--err);
      }
      button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }
      input[type="number"] {
        width: 100%;
        font: inherit;
        background: var(--card2);
        color: var(--fg);
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 10px 12px;
        font-variant-numeric: tabular-nums;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .row > * {
        flex: 1;
      }
      .presets {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        margin-top: 8px;
      }
      .presets button {
        padding: 8px 4px;
        font-size: 13px;
        font-variant-numeric: tabular-nums;
      }
      .presets button.active {
        background: var(--accent-strong);
        color: white;
      }
      /* Listening-log panel
         - capped height + scroll so a full ring buffer doesn't push
           the rest of the console below the fold on a phone.
         - monospace freq column for easy column scanning. */
      .log {
        max-height: 12rem;
        overflow-y: auto;
        margin: 0;
        padding: 0;
        list-style: none;
        font-size: 0.85rem;
        line-height: 1.35;
      }
      .log li {
        display: grid;
        grid-template-columns: 4.5rem 3.4rem 1fr;
        gap: 0.4rem;
        padding: 0.25rem 0;
        border-bottom: 1px solid var(--border);
      }
      .log li:last-child {
        border-bottom: 0;
      }
      .log .col-time {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .log .col-freq {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-weight: 600;
      }
      .log .col-meta {
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .log-empty {
        color: var(--muted);
        text-align: center;
        padding: 1rem 0;
      }
      /* Spectrum chart styles. The <canvas> sizes itself via JS to
         match its CSS pixel width × DPR for crisp bars on Retina
         displays. The wrapper enforces a fixed CSS height so a slow
         /api/spectrum response doesn't pop the layout. */
      .spectrum {
        display: block;
        width: 100%;
        height: 6.5rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 0.5rem;
      }
      .spectrum-meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.72rem;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        margin-top: 0.25rem;
      }
      .footer {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        margin-top: 16px;
      }
      .err {
        color: var(--err);
        font-size: 12px;
        text-align: center;
        min-height: 1em;
      }
      /* OTA card
         - hidden by default; revealed via the "Firmware" toggle so the
           rare-use control doesn't crowd day-to-day buttons.
         - progress bar reuses the .meter palette for visual consistency
           with the RSSI strength meter. */
      details.ota > summary {
        cursor: pointer;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        list-style: none;
      }
      details.ota > summary::-webkit-details-marker {
        display: none;
      }
      details.ota[open] > summary::after {
        content: " \25B2";
      }
      details.ota:not([open]) > summary::after {
        content: " \25BC";
      }
      .ota-status {
        font-size: 13px;
        color: var(--muted);
        margin: 8px 0;
        min-height: 1.2em;
        font-variant-numeric: tabular-nums;
      }
      .ota-status.ok {
        color: #4ade80;
      }
      .ota-status.fail {
        color: var(--err);
      }
    </style>
  </head>
  <body>
    <h1>ESP-Radio</h1>

    <section class="card">
      <div class="freq">
        <span id="freqInt">--</span>.<span id="freqDec">-</span><small>MHz</small>
      </div>
      <div class="station">
        <div class="name" id="stationName">--------</div>
        <div class="now-playing" id="nowPlaying" hidden></div>
        <div class="rt" id="radioText"></div>
      </div>
      <div class="badges">
        <span class="badge" id="bStereo">MO</span>
        <span class="badge" id="bPty" hidden></span>
        <span class="badge" id="bAf" hidden></span>
        <span class="badge" id="bClock" hidden></span>
      </div>
      <div class="meter" aria-label="signal strength"><span id="rssiBar"></span></div>
    </section>

    <section class="card">
      <div class="grid three">
        <button id="btnDown" aria-label="tune down 0.1 MHz">&minus;0.1</button>
        <button id="btnCycle" class="primary" aria-label="cycle preset">Preset &rarr;</button>
        <button id="btnUp" aria-label="tune up 0.1 MHz">+0.1</button>
      </div>
      <div class="row">
        <input id="freqInput" type="number" inputmode="decimal" step="0.1" min="87.5" max="108.0" placeholder="e.g. 96.5" />
        <button id="btnTune" class="primary">Tune</button>
      </div>
      <div class="row">
        <button id="btnSave">Save preset</button>
        <button id="btnMute" class="danger">Mute</button>
      </div>
      <div class="presets" id="presets"></div>
      <div class="err" id="err"></div>
    </section>

    <section class="card">
      <details class="ota">
        <summary>Firmware update</summary>
        <p style="font-size:12px;color:var(--muted);margin:8px 0;">
          Plain HTTP only, IPv4 host. Example:
          <code>http://192.168.1.10:8000/firmware.bin</code>.
          The device stays running until the new image is fully staged;
          reboot manually after success.
        </p>
        <div class="row">
          <input id="otaUrl" type="text" inputmode="url" placeholder="http://..." autocomplete="off" spellcheck="false" style="flex:2;" />
          <button id="btnOta" class="primary" style="flex:1;">Update</button>
        </div>
        <div id="otaStatus" class="ota-status" aria-live="polite">idle</div>
        <div class="meter" aria-label="OTA progress"><span id="otaBar"></span></div>
      </details>
    </section>

    <section class="card" aria-labelledby="spectrumTitle">
      <h2 id="spectrumTitle" style="margin:0 0 .5rem;font-size:.95rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;">
        FM spectrum
      </h2>
      <canvas id="spectrum" class="spectrum" aria-label="FM band RSSI sweep"></canvas>
      <div class="spectrum-meta">
        <span id="spectrumLow">87.5</span>
        <span id="spectrumStatus">—</span>
        <span id="spectrumHigh">108.0</span>
      </div>
      <div class="row" style="margin-top:.5rem;">
        <button id="btnScan" class="primary" style="flex:1;">Scan</button>
      </div>
    </section>

    <section class="card" aria-labelledby="logTitle">
      <h2 id="logTitle" style="margin:0 0 .5rem;font-size:.95rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;">
        Listening log
      </h2>
      <ul class="log" id="log" aria-live="polite">
        <li class="log-empty" id="logEmpty">No samples yet&hellip;</li>
      </ul>
    </section>

    <div class="footer" id="footer">connecting&hellip;</div>

    <script>
      const $ = (id) => document.getElementById(id);

      const post = async (path, body) => {
        const opts = { method: "POST" };
        if (body !== undefined) {
          opts.headers = { "content-type": "application/json" };
          opts.body = JSON.stringify(body);
        }
        try {
          const res = await fetch(path, opts);
          if (!res.ok) {
            $("err").textContent = `${path}: HTTP ${res.status}`;
          } else {
            $("err").textContent = "";
            // Eager refresh so the user sees immediate feedback rather
            // than waiting for the next 1 s poll tick.
            refresh();
          }
        } catch (e) {
          $("err").textContent = `${path}: ${e.message}`;
        }
      };

      $("btnUp").addEventListener("click", () => post("/api/tune/up"));
      $("btnDown").addEventListener("click", () => post("/api/tune/down"));
      $("btnCycle").addEventListener("click", () => post("/api/preset/cycle"));
      $("btnSave").addEventListener("click", () => post("/api/preset/save"));
      $("btnMute").addEventListener("click", () => post("/api/mute"));

      $("btnScan").addEventListener("click", async () => {
        const btn = $("btnScan");
        const status = $("spectrumStatus");
        // Disable the trigger while the sweep is in flight so a second
        // click cannot queue a duplicate command on the (size-8) input
        // channel. The sweep takes ~4 s on the 52-bucket plan; we
        // re-enable after a generous 6 s timeout regardless of whether
        // the spectrum poll has caught up, so the UI stays unstuck if
        // the device drops the response.
        btn.disabled = true;
        status.textContent = "scanning\u2026";
        await post("/api/spectrum/scan");
        // Poll the spectrum endpoint a few times so the bars refresh
        // as soon as the device finishes; the 1 s state poller will
        // also pick it up but the explicit fetch shortens UI latency.
        const start = Date.now();
        const tick = async () => {
          await drawSpectrum();
          if (Date.now() - start < 6000) {
            setTimeout(tick, 800);
          } else {
            btn.disabled = false;
            status.textContent = "\u2014";
          }
        };
        setTimeout(tick, 1500);
      });

      $("btnOta").addEventListener("click", () => {
        const url = $("otaUrl").value.trim();
        if (!url.startsWith("http://")) {
          $("err").textContent = "OTA URL must start with http://";
          return;
        }
        post("/api/ota", { url });
      });

      $("btnTune").addEventListener("click", () => {
        const raw = parseFloat($("freqInput").value);
        if (!Number.isFinite(raw) || raw < 87.5 || raw > 108.0) {
          $("err").textContent = "Frequency must be 87.5\u2013108.0 MHz";
          return;
        }
        // Round to nearest 0.1 MHz to match the chip's tuning granularity.
        const x10 = Math.round(raw * 10);
        post("/api/tune", { freq_x10: x10 });
      });

      const fmtFreq = (x10) => {
        const i = Math.floor(x10 / 10);
        const d = x10 % 10;
        return [i, d];
      };

      const setBadge = (el, text, on) => {
        if (!text) {
          el.hidden = true;
          return;
        }
        el.hidden = false;
        el.textContent = text;
        el.classList.toggle("on", !!on);
      };

      // Pull the latest /api/spectrum snapshot and paint it as a
      // bar chart on the <canvas>. Cheap enough to call on demand
      // (once per scan + once on first load + every 10 s in case
      // someone manually re-tunes elsewhere). 52 bars at ~6 px each
      // fit comfortably on a 360 px-wide phone canvas; on a wider
      // viewport the bars stretch but stay aligned to the band edges.
      const drawSpectrum = async () => {
        const canvas = $("spectrum");
        if (!canvas) return;
        let snap;
        try {
          const res = await fetch("/api/spectrum");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          snap = await res.json();
        } catch (e) {
          $("err").textContent = `spectrum: ${e.message}`;
          return;
        }
        const samples = snap.samples || [];
        if (samples.length === 0) return;

        // Match the device pixel ratio for crisp rendering on
        // Retina / hi-DPI screens. The visible CSS size is unchanged.
        const dpr = window.devicePixelRatio || 1;
        const cssW = canvas.clientWidth;
        const cssH = canvas.clientHeight;
        if (canvas.width !== cssW * dpr || canvas.height !== cssH * dpr) {
          canvas.width = Math.max(1, Math.floor(cssW * dpr));
          canvas.height = Math.max(1, Math.floor(cssH * dpr));
        }
        const ctx = canvas.getContext("2d");
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, cssW, cssH);

        const n = samples.length;
        const slot = cssW / n;
        const barGap = Math.max(1, slot * 0.15);
        const barW = Math.max(1, slot - barGap);
        // Si4703 RSSI scale is 0..=75; use 80 as the chart ceiling
        // for some headroom so bars at peak still leave a px or two
        // visible above the bar tip.
        const scaleMax = 80;
        const accent = getComputedStyle(document.documentElement)
          .getPropertyValue("--accent")
          .trim() || "#3b82f6";
        const muted = getComputedStyle(document.documentElement)
          .getPropertyValue("--muted")
          .trim() || "#64748b";

        // Where does the currently tuned frequency fall? We mirror
        // the Rust-side bucket math: bucket i covers
        //     [bottom + span*i/N, bottom + span*(i+1)/N)
        // so the inverse `(freq - bottom) * N / span` lands the cursor.
        const span = snap.top_x10 - snap.bottom_x10;
        let cursor = -1;
        if (snap.freq_x10 >= snap.bottom_x10 && span > 0) {
          cursor = Math.min(
            n - 1,
            Math.floor(((snap.freq_x10 - snap.bottom_x10) * n) / span),
          );
        }

        for (let i = 0; i < n; i++) {
          const v = samples[i];
          const h = (v / scaleMax) * (cssH - 4);
          const x = i * slot + barGap / 2;
          const y = cssH - h;
          ctx.fillStyle = i === cursor ? accent : muted;
          ctx.fillRect(x, y, barW, h);
        }
      };

      const refresh = async () => {
        try {
          const res = await fetch("/api/state");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const s = await res.json();

          const [fi, fd] = fmtFreq(s.freq_x10);
          $("freqInt").textContent = fi;
          $("freqDec").textContent = fd;

          $("stationName").textContent = s.station_name || "--------";
          $("radioText").textContent = s.radio_text || "";

          // RT+ "now playing" chip: the firmware pre-joins title and
          // artist into a single `{artist} — {title}` string so this
          // path stays a one-liner. `s.rt_plus` is omitted (`undefined`)
          // when the station does not transmit RT+ or while no item
          // is currently in progress, in which case we hide the chip
          // and let the raw `radioText` scroller do the talking.
          const npEl = $("nowPlaying");
          if (s.rt_plus) {
            // textContent (rather than innerHTML) so a station injecting
            // `<` / `&` in the RT+ payload can't escape into the markup.
            npEl.textContent = "\u{1F3B5} " + s.rt_plus;
            npEl.hidden = false;
          } else {
            npEl.hidden = true;
            npEl.textContent = "";
          }

          const stereoText = s.auto_mono ? "MO*" : s.stereo ? "ST" : "MO";
          setBadge($("bStereo"), stereoText, s.stereo && !s.auto_mono);
          setBadge($("bPty"), s.pty_label || "", true);
          setBadge(
            $("bAf"),
            s.af_following ? "AF\u2192" : s.af_count > 0 ? `AF\u00b7${s.af_count}` : "",
            s.af_following,
          );
          setBadge($("bClock"), s.clock || "", false);

          const rssiPct = Math.min(100, Math.round((s.rssi / 75) * 100));
          $("rssiBar").style.width = rssiPct + "%";

          $("btnMute").textContent = s.muted ? "Unmute" : "Mute";

          // Render the preset chip strip. Empty slots get a disabled
          // placeholder so the layout is stable across saves. When the
          // device has cached an RDS PS name for the slot we show the
          // friendly label (e.g. "BBC R1") instead of the numeric
          // frequency; the title attribute keeps the frequency
          // discoverable on hover for both mouse and screen-reader use.
          const wrap = $("presets");
          wrap.innerHTML = "";
          s.presets.forEach((slot, idx) => {
            const btn = document.createElement("button");
            const freq = slot.freq;
            if (freq === 0) {
              btn.textContent = "\u00b7";
              btn.disabled = true;
            } else {
              const [pi, pd] = fmtFreq(freq);
              const freqLabel = `${pi}.${pd}`;
              btn.textContent = slot.ps ? slot.ps : freqLabel;
              btn.title = slot.ps ? `${slot.ps} \u2022 ${freqLabel}` : freqLabel;
              if (s.preset_idx === idx) btn.classList.add("active");
              btn.addEventListener("click", () =>
                post("/api/tune", { freq_x10: freq }),
              );
            }
            wrap.appendChild(btn);
          });

          $("footer").textContent = s.wifi_connected
            ? `${s.wifi_ssid} \u2022 vol ${s.volume}/15`
            : "WiFi offline";

          updateOta(s.ota || { phase: "idle" });
        } catch (e) {
          $("err").textContent = `state: ${e.message}`;
        }
      };

      refresh();
      setInterval(refresh, 1000);
      // Spectrum chart is much cheaper to refresh than full state but
      // also stale on a longer timescale (RSSI changes are slow). Once
      // on load + every 10 s catches manual retunes from the LCD knob;
      // the Scan button does its own faster polling burst.
      drawSpectrum();
      setInterval(drawSpectrum, 10000);

      // Map an OtaProgressDto into the status label + progress bar.
      // Phases match `OtaProgressDto.phase` strings emitted by the
      // server (see web.rs).
      const updateOta = (ota) => {
        const status = $("otaStatus");
        const bar = $("otaBar");
        const btn = $("btnOta");
        status.classList.remove("ok", "fail");
        // Idle / terminal phases re-enable the trigger; busy phases
        // disable it so a double-click can't queue a second job.
        const busy =
          ota.phase === "connecting" ||
          ota.phase === "downloading" ||
          ota.phase === "activating";
        btn.disabled = busy;
        switch (ota.phase) {
          case "idle":
            status.textContent = "idle";
            bar.style.width = "0%";
            break;
          case "connecting":
            status.textContent = "connecting\u2026";
            bar.style.width = "5%";
            break;
          case "downloading": {
            const r = ota.received || 0;
            if (ota.total) {
              const pct = Math.min(100, Math.round((r * 100) / ota.total));
              status.textContent = `downloading ${(r / 1024).toFixed(1)} / ${(ota.total / 1024).toFixed(1)} KiB (${pct}%)`;
              bar.style.width = pct + "%";
            } else {
              status.textContent = `downloading ${(r / 1024).toFixed(1)} KiB`;
              bar.style.width = "50%";
            }
            break;
          }
          case "activating":
            status.textContent = "activating\u2026";
            bar.style.width = "95%";
            break;
          case "success":
            status.textContent = "success \u2014 reboot to run new firmware";
            status.classList.add("ok");
            bar.style.width = "100%";
            break;
          case "failed":
            status.textContent = `failed: ${ota.reason || "unknown"}`;
            status.classList.add("fail");
            bar.style.width = "0%";
            break;
          default:
            status.textContent = ota.phase;
        }
      };

      // Listening log refresh — once every 5 s. The buffer only
      // changes on PS / freq events, so polling more often would
      // just churn DOM nodes for no visual benefit.
      const fmtAgo = (deltaSecs) => {
        if (deltaSecs < 60) return `${deltaSecs}s ago`;
        const m = Math.floor(deltaSecs / 60);
        const s = deltaSecs % 60;
        return `${m}m${String(s).padStart(2, "0")}s`;
      };

      const refreshLog = async () => {
        try {
          const res = await fetch("/api/log");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const wrap = $("log");
          wrap.innerHTML = "";
          if (!data.entries.length) {
            const li = document.createElement("li");
            li.className = "log-empty";
            li.textContent = "No samples yet\u2026";
            wrap.appendChild(li);
            return;
          }
          // Show newest first; the API returns oldest-first.
          const reversed = data.entries.slice().reverse();
          const newestUptime = reversed[0].uptime_secs;
          // When the device has SNTP-synced (data.now_unix is set), we
          // can pin each entry to a real wall-clock time. The math is:
          //   wall_at_entry = now_unix - (newestUptime - entry.uptime_secs)
          // because all uptime_secs values share the same boot epoch.
          const haveWall = typeof data.now_unix === "number";
          for (const entry of reversed) {
            const li = document.createElement("li");

            const time = document.createElement("span");
            time.className = "col-time";
            const delta = Math.max(0, newestUptime - entry.uptime_secs);
            if (haveWall) {
              const wallSecs = data.now_unix - delta;
              const d = new Date(wallSecs * 1000);
              const hh = String(d.getHours()).padStart(2, "0");
              const mm = String(d.getMinutes()).padStart(2, "0");
              time.textContent = `${hh}:${mm}`;
              // Keep the relative form available on hover for context.
              time.title = fmtAgo(delta);
            } else {
              time.textContent = fmtAgo(delta);
            }

            const freq = document.createElement("span");
            freq.className = "col-freq";
            const [fi, fd] = fmtFreq(entry.freq_x10);
            freq.textContent = `${fi}.${fd}`;

            const meta = document.createElement("span");
            meta.className = "col-meta";
            const psPart = entry.ps ? entry.ps.trim() : "";
            const rtPart = entry.rt ? entry.rt.trim() : "";
            meta.textContent = [psPart, rtPart].filter(Boolean).join(" \u00b7 ");
            meta.title = meta.textContent;

            li.appendChild(time);
            li.appendChild(freq);
            li.appendChild(meta);
            wrap.appendChild(li);
          }
        } catch (e) {
          $("err").textContent = `log: ${e.message}`;
        }
      };

      refreshLog();
      setInterval(refreshLog, 5000);
    </script>
  </body>
</html>
